<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Sessiz Hikayeler</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>✨ Sessiz Hikayeler ✨</h1>

<button id="darkModeToggle">🌙 Gece Modu</button>
<button id="randomBtn">🎲 Rastgele Hikaye</button>

<h2>🔥 En Çok Empati Alanlar</h2>
<div id="topStories"></div>

<h2>Tüm Hikayeler</h2>
<div id="storyList"></div>

<h2>Hikayeni Paylaş</h2>
<form id="storyForm">
  <input type="text" id="username" placeholder="Kullanıcı adı" required>
  <select id="category">
    <option>Ailevi</option>
    <option>Kariyer</option>
    <option>Dostluk</option>
    <option>Aşk</option>
    <option>Hastalık</option>
  </select>
  <textarea id="story" placeholder="Hikayeni yaz..." required></textarea>
  <button type="submit">Paylaş</button>
</form>

<script type="module" src="script.js"></script>
</body>
</html>
