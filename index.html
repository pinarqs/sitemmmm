<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Sessiz Hikayeler</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="glitter"></div>
<button class="dark-toggle" onclick="toggleDarkMode()">🌙</button>

<div id="welcomeScreen" class="screen active">
    <h1>Sessiz Hikayeler</h1>
    <p>Burada kimse seni yargılamaz.</p>
    <button onclick="goToStories()">Hikayelere Git</button>
</div>

<div id="storyScreen" class="screen">
    <div class="top-bar">
        <h2>Hikayeler</h2>
        <div class="filters">
            <select id="categoryFilter" onchange="loadStories()">
                <option value="all">Tüm Kategoriler</option>
                <option value="ailevi">Ailevi</option>
                <option value="kariyer">Kariyer</option>
                <option value="dostluk">Dostluk</option>
                <option value="aşk">Aşk</option>
                <option value="hastalık">Hastalık</option>
            </select>

            <select id="moodFilter" onchange="loadStories()">
                <option value="all">Tüm Ruh Halleri</option>
                <option value="üzgün">Üzgün</option>
                <option value="çaresiz">Çaresiz</option>
                <option value="pişman">Pişman</option>
            </select>

            <button onclick="goToWrite()">+ Yaz</button>
        </div>
    </div>

    <div id="storyList"></div>
</div>

<div id="writeScreen" class="screen">
    <h2>Hikayeni Anlat</h2>

    <input type="text" id="username" placeholder="Kullanıcı Adı (zorunlu)">
    <input type="file" id="photo" accept="image/*">

    <select id="category">
        <option value="ailevi">Ailevi</option>
        <option value="kariyer">Kariyer</option>
        <option value="dostluk">Dostluk</option>
        <option value="aşk">Aşk</option>
        <option value="hastalık">Hastalık</option>
    </select>

    <select id="mood">
        <option value="üzgün">Üzgün</option>
        <option value="çaresiz">Çaresiz</option>
        <option value="pişman">Pişman</option>
    </select>

    <textarea id="storyText" placeholder="İçinde kalanları yaz..."></textarea>

    <button onclick="saveStory()">Gönder</button>
    <button onclick="goToStories()">Geri</button>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
